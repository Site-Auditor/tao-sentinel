# Deploy: manually triggered (workflow_dispatch) release to the production host.
# It SSHes into the server and pulls the latest GHCR image, then restarts the
# compose stack.
#
# Required repository SECRETS (Settings -> Secrets and variables -> Actions -> Secrets):
#   DEPLOY_HOST    - hostname or IP of the production server
#   DEPLOY_USER    - SSH user with permission to run docker compose
#   DEPLOY_SSH_KEY - private SSH key (full PEM, including the BEGIN/END lines)
#                    whose PUBLIC key is in that user's ~/.ssh/authorized_keys
# Optional SECRETS:
#   DEPLOY_PORT    - SSH port (defaults to 22)
#
# Optional repository VARIABLES (Settings -> Secrets and variables -> Actions -> Variables):
#   DEPLOY_PATH    - directory on the server holding compose.yaml + sentinel.yaml
#                    (defaults to /opt/tao-sentinel; set it to wherever you
#                    cloned the repo, e.g. /root/bittensor/tao-sentinel)
#
# Server prerequisites:
#   - $DEPLOY_PATH is a git clone of this repo holding a real sentinel.yaml.
#   - Recommended: a .env file next to compose.yaml (docker compose reads it
#     automatically; it is gitignored) holding:
#       TAOSTATS_API_KEY=...   # empty/absent -> deterministic mock mode
#
# Deploy strategy: git pull + build ON the server (compose.yaml's `build: .`
# fallback). The GHCR image CI publishes is PRIVATE (org policy disallows
# public packages), so pulling it would force a registry token onto the
# server; building from source needs no registry credentials at all. If the
# org ever allows public packages, swap the script back to:
#   export IMAGE="ghcr.io/<lowercased repo>:latest"
#   docker compose pull && docker compose up -d
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: deploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart the compose stack over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd "${{ vars.DEPLOY_PATH || '/opt/tao-sentinel' }}"
            git pull --ff-only
            docker compose up -d --build
            docker compose ps
