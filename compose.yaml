# tao-sentinel Docker Compose stack.
#
# Three services on a private network:
#   dashboard - the read-only web UI / JSON API (NOT published; reachable only
#               on the compose network, fronted by `proxy`).
#   watcher   - the long-running alert engine (`watch`), restarts on failure.
#   proxy     - nginx reverse proxy; the only published service.
#
# The SAME file works locally and on a server:
#   * Local:  `docker compose up -d --build` builds the image from this repo.
#   * Server: set IMAGE=ghcr.io/<owner>/tao-sentinel:latest in the environment
#             (or an .env file) and `docker compose pull && docker compose up -d`
#             to run the prebuilt GHCR image. The `build: .` block is ignored
#             when pulling, so deployments never need the source tree.
#
# Secrets: TAOSTATS_API_KEY is read from the host environment and passed
# through. If it is empty/unset, tao-sentinel automatically falls back to its
# deterministic mock mode, so the whole stack still comes up without any key.

services:
  dashboard:
    image: ${IMAGE:-tao-sentinel:latest}
    build: .
    # Default CMD is `serve --host 0.0.0.0 --port 8787`; add --config so the
    # portfolio card and state-backed alerts read the mounted config.
    command: ["serve", "--host", "0.0.0.0", "--port", "8787", "--config", "/config/sentinel.yaml"]
    # No published ports: the dashboard is reachable only via the proxy on the
    # internal compose network (service DNS name `dashboard`).
    environment:
      # Empty/unset -> mock mode (no network, deterministic data).
      TAOSTATS_API_KEY: ${TAOSTATS_API_KEY:-}
    volumes:
      - sentinel-state:/data
      - ./sentinel.yaml:/config/sentinel.yaml:ro
    restart: unless-stopped

  watcher:
    image: ${IMAGE:-tao-sentinel:latest}
    build: .
    command: ["watch", "--config", "/config/sentinel.yaml"]
    # The image HEALTHCHECK probes the dashboard's :8787, which the `watch`
    # command never serves; disable it here so the watcher has no healthcheck
    # (it would otherwise flap to "unhealthy").
    healthcheck:
      disable: true
    environment:
      TAOSTATS_API_KEY: ${TAOSTATS_API_KEY:-}
    volumes:
      - sentinel-state:/data
      - ./sentinel.yaml:/config/sentinel.yaml:ro
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    # Map host 8081 -> nginx 80 for local use (8080 was already in use on this
    # host). In production change this to "80:80" (and "443:443" once TLS is
    # configured in the nginx conf).
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx/tao-sentinel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  # Persists the watch-engine state (/data/state.json) across restarts; shared
  # read/write by the watcher and the dashboard.
  sentinel-state:
