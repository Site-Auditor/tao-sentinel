# tao-sentinel.conf -- nginx reverse-proxy (HTTP) for the tao-sentinel dashboard.
#
# Mounted by compose.yaml at /etc/nginx/conf.d/default.conf:ro inside the
# `proxy` service (nginx:1.27-alpine). It fronts the `dashboard` compose
# service, which listens on :8787 but is NOT published to the host -- nginx is
# the only thing that can reach it (compose-network DNS name `dashboard`).
#
# This is the plain-HTTP config used for local runs and as the origin behind an
# external TLS terminator (Cloudflare, an existing reverse proxy, etc.). For
# nginx-terminated TLS on the host see the sibling file
# tao-sentinel-tls.conf and deploy/README.md.

# Shared gzip settings for text responses (HTML pages + JSON API payloads).
# Note: text/html is always gzipped by nginx and must NOT be listed in
# gzip_types (doing so emits a "duplicate MIME type" warning).
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml+rss;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # `default_server` makes this block answer requests with any (or no) Host
    # header, so `curl http://localhost:8081/` from the host -- which sends
    # `Host: localhost` -- still reaches the dashboard. In production the public
    # name is tao.insightfulbytes.com (see the TLS config for the canonical
    # server_name + HTTPS redirect).
    server_name tao.insightfulbytes.com _;

    # Security headers applied to every response from this server.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Generous proxy timeouts: the dashboard may refresh upstream taostats data
    # (or compute the portfolio card) on a cold cache before responding.
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 240s;

    # Resolve the `dashboard` service name via Docker's embedded DNS
    # (127.0.0.11) at REQUEST time. A static `upstream`/`server dashboard:8787`
    # block resolves the name only once at startup and caches that IP, so when
    # the dashboard container is recreated (a redeploy: `docker compose pull &&
    # up -d`) it gets a new IP and nginx keeps hitting the dead one -> 502.
    # Resolving per request via a variable in proxy_pass survives recreations.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $dashboard_upstream dashboard:8787;

    location / {
        proxy_pass http://$dashboard_upstream;
        proxy_http_version 1.1;

        # Preserve the original request metadata for the dashboard.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

