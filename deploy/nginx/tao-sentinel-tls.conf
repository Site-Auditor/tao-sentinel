# tao-sentinel-tls.conf -- nginx reverse-proxy (HTTPS/TLS) for the dashboard.
#
# This is the PRODUCTION variant of deploy/nginx/tao-sentinel.conf: nginx
# terminates TLS for tao.insightfulbytes.com using certbot-issued certificates
# and proxies to the `dashboard` compose service on its in-network port 8787
# (the dashboard is never published to the host directly).
#
# It is a complete, ready-to-use config -- but it requires real certificates to
# exist BEFORE nginx starts, so it is NOT mounted by default. To enable it:
#   1. Obtain certs on the host (see deploy/README.md, certbot section).
#   2. Mount this file at /etc/nginx/conf.d/default.conf in the `proxy` service
#      (replace the tao-sentinel.conf mount), and mount /etc/letsencrypt and
#      /var/www/certbot into the proxy container.
#   3. Change the proxy port publish from "8080:80" to "80:80" and "443:443".
#   4. docker compose up -d.

# text/html is always gzipped by nginx and must NOT be listed in gzip_types
# (doing so emits a "duplicate MIME type" warning).
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml+rss;

# Port 80: serve the ACME http-01 challenge for certbot renewals, and redirect
# everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name tao.insightfulbytes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Port 443: TLS-terminating reverse proxy to the dashboard.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tao.insightfulbytes.com;

    # certbot-managed certificate paths (webroot or nginx plugin both land
    # here). Issue with, e.g.:
    #   certbot certonly --webroot -w /var/www/certbot -d tao.insightfulbytes.com
    ssl_certificate     /etc/letsencrypt/live/tao.insightfulbytes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tao.insightfulbytes.com/privkey.pem;
    # Recommended hardening shipped by certbot's nginx plugin. Uncomment if the
    # files are mounted into the proxy container:
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (HSTS only makes sense once TLS is live).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Resolve the `dashboard` service name via Docker's embedded DNS at REQUEST
    # time (a variable in proxy_pass) so the proxy survives dashboard container
    # recreations; a static upstream block caches the startup IP -> 502 on
    # redeploy. See deploy/nginx/tao-sentinel.conf for the full rationale.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $dashboard_upstream dashboard:8787;

    location / {
        proxy_pass http://$dashboard_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
